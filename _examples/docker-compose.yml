services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mirage_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "15432:5432"
    command: >
      postgres
        -c log_statement=all
        -c log_min_duration_statement=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d mirage_test"]
      interval: 2s
      timeout: 3s
      retries: 10
