name: Release

# Triggered by pushing a semver tag, e.g.:
#   git tag v0.4.0 && git push origin v0.4.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required for GoReleaser to create the GitHub Release and upload assets

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # GoReleaser needs full history to build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      # Reuse the exact same gates as CI before shipping a release build,
      # so a release can never ship code that failed lint/tests.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
